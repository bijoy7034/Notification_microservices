<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Welcome!</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f7; padding: 20px; }
        .container { max-width: 600px; margin: auto; background: #fff; padding: 30px; border-radius: 8px; }
        .header { font-size: 24px; color: #2d89ef; font-weight: bold; margin-bottom: 20px; }
        .content { font-size: 16px; line-height: 1.5; }
        .footer { margin-top: 30px; font-size: 12px; color: #888; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">Welcome, {{ name }}!</div>
    <div class="content">
        We’re excited to have you on board.<br><br>
        Your account has been successfully created. You can now explore all our features and services.
    </div>
    <div class="footer">
        © 2026 Notification System
    </div>
</div>
</body>
</html>
