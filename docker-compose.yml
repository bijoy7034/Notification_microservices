services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmqctl", "status"]
      interval: 10s
      timeout: 5s
      retries: 5

  notification_api_service:
    build: ./services/notification_api
    container_name: notification_api_service
    depends_on:
      rabbitmq:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "8000:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  email_service:
    build: ./services/email_service
    container_name: email_service
    depends_on:
      rabbitmq:
        condition: service_healthy
    env_file:
      - .env
    command: python -m app.main

  sms_service:
    build: ./services/sms_service
    container_name: sms_service
    depends_on:
      rabbitmq:
        condition: service_healthy
    env_file:
      - .env
    command: python -m app.main

  push_service:
    build: ./services/push_service
    container_name: push_service
    depends_on:
      rabbitmq:
        condition: service_healthy
    env_file:
      - .env
    command: python -m app.main
